                const logDate = new Date(log.timestamp);
                const timeStr = `${logDate.getMonth() + 1}/${logDate.getDate()} ${logDate.getHours()}:${String(logDate.getMinutes()).padStart(2, '0')}`;
                
                result += `[${index + 1}] ${timeStr} - ${log.projectName} (${log.date})\n`;
                
                if (log.action === 'add') {
                    result += `   ➕ 추가: ${log.newContent}\n`;
                    result += `   작성자: ${log.userName}\n`;
                } else if (log.action === 'delete') {
                    result += `   ❌ 삭제: ${log.oldContent}\n`;
                    result += `   작성자: ${log.userName}\n`;
                } else if (log.action === 'update') {
                    result += `   ✏️ 수정\n`;
                    result += `   이전: ${log.oldContent}\n`;
                    result += `   이후: ${log.newContent}\n`;
                    result += `   작성자: ${log.userName}\n`;
                }
                
                result += `\n`;
            });
            
            result += `${'='.repeat(60)}\n`;
            result += `※ 최근 30일간의 변동 내역만 저장됩니다.`;
            
            resultArea.value = result;
            document.getElementById('copyChangeLogBtn').style.display = 'inline-block';
        }

        // ============================================
        // 주차 필터
        // ============================================

        function toggleWeekFilter() {
            renderCalendar();
        }

        // ============================================
        // 닉네임 변경
        // 설정 드롭다운
        function toggleSettingsMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('settingsMenu');
            menu.classList.toggle('show');
        }

        function closeSettingsMenu() {
            document.getElementById('settingsMenu').classList.remove('show');
        }

        // 외부 클릭 시 닫기
        document.addEventListener('click', function(e) {
            const dropdown = document.getElementById('settingsDropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                closeSettingsMenu();
            }
        });

        // 백업 서브메뉴 (팝업)
        function openBackupSubMenu() {
            closeSettingsMenu();
            document.getElementById('backupPopupOverlay').classList.add('show');
        }

        function closeBackupPopup() {
            document.getElementById('backupPopupOverlay').classList.remove('show');
        }

        // ============================================

        function changeUserName() {
            const currentName = localStorage.getItem('userName') || currentUser.name;
            const newName = prompt('새로운 닉네임을 입력하세요:', currentName);
            
            if (newName && newName.trim()) {
                const trimmedName = newName.trim();
                localStorage.setItem('userName', trimmedName);
                currentUser.name = trimmedName;
                
                // Firebase 프레즌스 업데이트
                if (useFirebase && db) {
                    const presenceRef = db.ref(`presence/${currentUser.id}`);
                    presenceRef.update({
                        name: trimmedName
                    });
                }
                
                alert(`닉네임이 "${trimmedName}"(으)로 변경되었습니다.`);
            }
        }

        // ============================================
        // 전체 초기화
        // ============================================

        function resetAllData() {
            const confirmMsg = `⚠️⚠️⚠️ 경고 ⚠️⚠️⚠️\n\n모든 데이터를 삭제하고 처음부터 시작합니다.\n\n삭제되는 데이터:\n- 모든 프로젝트\n- 모든 일정\n- 모든 확정 표시\n- localStorage\n- Firebase 데이터\n\n이 작업은 되돌릴 수 없습니다!\n\n정말로 초기화하시겠습니까?`;
            
            if (!confirm(confirmMsg)) {
                return;
            }
            
            if (!confirm('마지막 확인: 백업하셨나요? 정말 삭제하시겠습니까?')) {
                return;
            }
            
            // localStorage 초기화
            projects = [];
            schedules = {};
            confirmedSchedules = {};
            
            localStorage.setItem('projects', JSON.stringify(projects));
            localStorage.setItem('schedules', JSON.stringify(schedules));
            localStorage.setItem('confirmedSchedules', JSON.stringify(confirmedSchedules));
            
            // Firebase 초기화
            if (useFirebase && db) {
                db.ref('projects').remove().then(() => {
                    console.log('✅ Firebase projects 삭제 완료');
                });
                db.ref('schedules').remove().then(() => {
                    console.log('✅ Firebase schedules 삭제 완료');
                });
                db.ref('confirmedSchedules').remove().then(() => {
                    console.log('✅ Firebase confirmedSchedules 삭제 완료');
                });
            }
            
            // UI 초기화
            currentView = 'all';
            renderProjectTabs();
            renderCalendar();
            renderLegend();
            
            alert('✅ 전체 초기화 완료!\n\n이제 "+ 프로젝트 추가" 버튼으로 새로 시작하세요.');
        }

        // ============================================
        // 초기 로드
        // ============================================
        
        init();

        // ============================================
        // Firebase 실시간 협업 설정 (자동 활성화)
        // ============================================
        
        // Firebase 초기화
        (function initFirebase() {
            if (!window.firebaseConfig) {
                console.log('Firebase 설정이 없습니다. 로컬 모드로 실행됩니다.');
                return;
            }

            try {
                // Firebase 초기화 (compat 버전)
                const app = firebase.initializeApp(window.firebaseConfig);
                db = firebase.database();
                useFirebase = true;
                
                console.log('✅ Firebase 연결 성공!');
                
                // UI 업데이트
                document.getElementById('firebaseStatus').textContent = '🔥 실시간 연결됨';
                document.getElementById('firebaseStatus').classList.add('connected');
                document.getElementById('onlineUsers').style.display = 'block';
                
                // 프레즌스 시스템 설정
                setupPresence();
                
                // 데이터 실시간 동기화
                setupRealtimeSync();
                
                // 사용자 이름 설정 (처음 한 번만)
                if (!localStorage.getItem('userName')) {
                    const userName = prompt('사용자 이름을 입력하세요:', currentUser.name);
                    if (userName) {
                        localStorage.setItem('userName', userName);
                        currentUser.name = userName;
                    }
                }
                
            } catch (error) {
                console.error('Firebase 초기화 실패:', error);
                alert('Firebase 연결에 실패했습니다. 로컬 모드로 실행됩니다.\n\n' + error.message);
            }

            function setupPresence() {
                const presenceRef = db.ref(`presence/${currentUser.id}`);
                const userInfo = {
                    name: currentUser.name,
                    color: currentUser.color,
                    lastSeen: Date.now(),
                    editingCell: null,
                    currentView: currentView
                };
                
                // 접속 시 등록
                presenceRef.set(userInfo);
                
                // 종료 시 자동 삭제
                presenceRef.onDisconnect().remove();
                
                // 다른 사용자 감지
                const allPresenceRef = db.ref('presence');
                allPresenceRef.on('value', (snapshot) => {
                    onlineUsers = snapshot.val() || {};
                    renderOnlineUsers();
                    updateEditingIndicators();
                });
                
                // 주기적으로 lastSeen 업데이트
                setInterval(() => {
                    presenceRef.set({
                        ...userInfo,
                        lastSeen: Date.now(),
                        currentView: currentView
                    });
                }, 30000); // 30초마다
            }
            
            function setupRealtimeSync() {
                // 일정 실시간 동기화
                const schedulesRef = db.ref('schedules');
                schedulesRef.once('value', (snapshot) => {
                    const firebaseSchedules = snapshot.val() || {};
                    
                    // Firebase 우선: Firebase에 데이터가 있으면 사용
                    if (Object.keys(firebaseSchedules).length > 0) {
                        console.log('✅ Firebase에서 일정 데이터 복원:', Object.keys(firebaseSchedules).length, '개');
                        schedules = firebaseSchedules;
                        localStorage.setItem('schedules', JSON.stringify(schedules));
                        renderCalendar();
                    } else if (Object.keys(schedules).length > 0) {
                        // Firebase 비어있고 로컬에 데이터 있으면 업로드
                        console.log('📤 로컬 데이터를 Firebase에 업로드');
                        db.ref('schedules').set(schedules);
                    }
                    
                    // 이후 실시간 동기화
                    schedulesRef.on('value', (snapshot) => {
                        const updatedSchedules = snapshot.val() || {};
                        schedules = updatedSchedules;
                        localStorage.setItem('schedules', JSON.stringify(schedules));
                        renderCalendar();
                    });
                }).catch(error => {
                    console.error('❌ Firebase schedules 읽기 실패:', error);
                    console.error('에러 상세:', error.code, error.message);
                });
                
                // 확정 상태 실시간 동기화
                const confirmedRef = db.ref('confirmedSchedules');
                confirmedRef.once('value', (snapshot) => {
                    const firebaseConfirmed = snapshot.val() || {};
                    
                    if (Object.keys(firebaseConfirmed).length > 0) {
                        console.log('✅ Firebase에서 확정 데이터 복원:', Object.keys(firebaseConfirmed).length, '개');
                        confirmedSchedules = firebaseConfirmed;
                        localStorage.setItem('confirmedSchedules', JSON.stringify(confirmedSchedules));
                        renderCalendar();
                    } else if (Object.keys(confirmedSchedules).length > 0) {
                        console.log('📤 로컬 확정 데이터를 Firebase에 업로드');
                        db.ref('confirmedSchedules').set(confirmedSchedules);
                    }
                    
                    // 이후 실시간 동기화
                    confirmedRef.on('value', (snapshot) => {
                        const updatedConfirmed = snapshot.val() || {};
                        confirmedSchedules = updatedConfirmed;
                        localStorage.setItem('confirmedSchedules', JSON.stringify(confirmedSchedules));
                        renderCalendar();
                    });
                }).catch(error => {
                    console.error('❌ Firebase confirmedSchedules 읽기 실패:', error);
                    console.error('에러 상세:', error.code, error.message);
                });
                
                // 프로젝트 데이터 동기화
                // Firebase는 배열을 객체로 저장하므로 Object.values()로 변환 필요
                function normalizeFirebaseProjects(val) {
                    if (!val) return [];
                    if (Array.isArray(val)) return val;
                    if (typeof val === 'object') return Object.values(val);
                    return [];
                }
                
                const projectsRef = db.ref('projects');
                projectsRef.once('value', (snapshot) => {
                    const firebaseProjects = normalizeFirebaseProjects(snapshot.val());
                    
                    if (firebaseProjects.length > 0) {
                        console.log('✅ Firebase에서 프로젝트 데이터 복원:', firebaseProjects.length, '개');
                        projects = firebaseProjects;
                        localStorage.setItem('projects', JSON.stringify(projects));
                        renderProjectTabs();
                        renderLegend();
                        renderCalendar(); // 프로젝트 로드 후 달력 렌더링!
                    } else if (projects.length > 0) {
                        console.log('📤 로컬 프로젝트를 Firebase에 업로드');
                        db.ref('projects').set(projects);
                    } else {
                        // Firebase도 로컬도 비어있음
                        console.warn('⚠️ 프로젝트 데이터가 없습니다');
                        renderCalendar(); // 에러 메시지 표시를 위해 호출
                    }
                    
                    // 이후 실시간 동기화
                    projectsRef.on('value', (snapshot) => {
                        const updatedProjects = normalizeFirebaseProjects(snapshot.val());
                        projects = updatedProjects;
                        localStorage.setItem('projects', JSON.stringify(projects));
                        renderProjectTabs();
                        renderLegend();
                        renderCalendar(); // 프로젝트 업데이트 시 달력도 업데이트!
                    });
                }).catch(error => {
                    console.error('❌ Firebase projects 읽기 실패:', error);
                    console.error('에러 상세:', error.code, error.message);
                    renderCalendar(); // 에러 메시지 표시
                });
                
                // 변동 로그 동기화
                // Firebase는 배열을 객체({0:..., 1:...})로 저장 → Object.values()로 변환
                function normalizeFirebaseArray(val) {
                    if (!val) return [];
                    if (Array.isArray(val)) return val;
                    if (typeof val === 'object') return Object.values(val);
                    return [];
                }
                
                // once()+on() 경쟁 조건 제거: on() 단독 + 초기화 플래그 방식
                let changeLogInitialized = false;
                const changeLogRef = db.ref('changeLog');
                changeLogRef.on('value', (snapshot) => {
                    const fbChangeLog = normalizeFirebaseArray(snapshot.val());
                    
                    if (!changeLogInitialized) {
                        changeLogInitialized = true;
                        if (fbChangeLog.length > 0) {
                            console.log('✅ Firebase에서 변동 로그 복원:', fbChangeLog.length, '개');
                            changeLog = fbChangeLog;
                            localStorage.setItem('changeLog', JSON.stringify(changeLog));
                        } else if (Array.isArray(changeLog) && changeLog.length > 0) {
                            console.log('📤 로컬 변동 로그를 Firebase에 업로드:', changeLog.length, '개');
                            db.ref('changeLog').set(changeLog);
                        }
                    } else {
                        // 실시간 업데이트: 데이터가 있을 때만 반영
                        if (fbChangeLog.length > 0) {
                            changeLog = fbChangeLog;
                            localStorage.setItem('changeLog', JSON.stringify(changeLog));
                        }
                    }
                }, (error) => {
                    console.error('❌ Firebase changeLog 읽기 실패:', error);
                    console.error('에러 상세:', error.code, error.message);
                });
            }
            
            // 편집 상태 업데이트 함수를 전역으로 노출
            window.updateEditingStatus = function(dateStr) {
                if (!useFirebase || !db) return;
                
                const presenceRef = db.ref(`presence/${currentUser.id}`);
                presenceRef.set({
                    name: currentUser.name,
                    color: currentUser.color,
                    lastSeen: Date.now(),
                    editingCell: dateStr,
                    currentView: currentView
                });
            };
            
            window.clearEditingStatus = function() {
                if (!useFirebase || !db) return;
                
                const presenceRef = db.ref(`presence/${currentUser.id}`);
                presenceRef.set({
                    name: currentUser.name,
                    color: currentUser.color,
                    lastSeen: Date.now(),
                    editingCell: null,
                    currentView: currentView
                });
            };
            
            function renderOnlineUsers() {
                const userListDiv = document.getElementById('userList');
                const allUsers = Object.entries(onlineUsers).filter(([id, _]) => id !== currentUser.id);
                
                // 중복 제거: 같은 이름의 사용자는 최신 것만 유지
                const uniqueUsers = new Map();
                allUsers.forEach(([id, user]) => {
                    const existingUser = uniqueUsers.get(user.name);
                    if (!existingUser || id > existingUser.id) {
                        uniqueUsers.set(user.name, { id, ...user });
                    }
                });
                
                const users = Array.from(uniqueUsers.values());
                
                if (users.length === 0) {
                    userListDiv.innerHTML = '<div style="font-size: 11px; color: #d1d5db;">나만 접속 중</div>';
                    return;
                }
                
                userListDiv.innerHTML = users.map(user => {
                    const editing = user.editingCell ? ` (편집 중)` : '';
                    return `
                        <div class="user-item">
                            <div class="user-avatar" style="background: ${user.color};">
                                ${user.name.charAt(0)}
                            </div>
                            <div style="flex: 1;">
                                <div style="font-weight: 500;">${user.name}</div>
                                ${editing ? `<div style="font-size: 10px; color: #6b7280;">${editing}</div>` : ''}
                            </div>
                            <div class="user-status"></div>
                        </div>
                    `;
                }).join('');
            }
            
            function updateEditingIndicators() {
                // 모든 편집 중 표시 제거
                document.querySelectorAll('.editing-indicator').forEach(el => el.remove());
                document.querySelectorAll('.being-edited').forEach(el => {
                    el.classList.remove('being-edited');
                    el.style.outlineColor = '';
                });
                
                // 다른 사용자가 편집 중인 셀 표시
                Object.entries(onlineUsers).forEach(([id, user]) => {
                    if (id === currentUser.id || !user.editingCell || user.currentView !== currentView) return;
                    
                    const cell = document.querySelector(`[data-date="${user.editingCell}"]`);
                    if (cell) {
                        cell.classList.add('being-edited');
                        cell.style.outlineColor = user.color;
                        
                        const indicator = document.createElement('div');
                        indicator.className = 'editing-indicator';
                        indicator.style.background = user.color;
                        indicator.textContent = user.name.charAt(0);
                        indicator.title = `${user.name}님이 편집 중`;
                        cell.appendChild(indicator);
                    }
                });
            }
            
            // 전역 함수로 노출
            window.renderOnlineUsers = renderOnlineUsers;
            window.updateEditingIndicators = updateEditingIndicators;
        })();
    </script>
